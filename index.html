<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Tech Talk 2026</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>Campus Tech Talk 2026</h1>

    <!-- Event Card -->
    <div class="event-card">
        <h2>AI & Future Technologies</h2>
        <p><strong>Date:</strong> March 15, 2026</p>
        <p><strong>Time:</strong> 10:00 AM</p>
        <p><strong>Venue:</strong> Main Auditorium</p>
    </div>

    <!-- Registration Form -->
    <form id="regForm">
        <input type="text" id="name" placeholder="Enter your name">
        
        <input type="email" id="email" placeholder="Enter your email">
        
        <select id="branch">
            <option value="">Select Branch</option>
            <option>CSE</option>
            <option>IT</option>
            <option>ECE</option>
            <option>ME</option>
        </select>

        <label>
            <input type="checkbox" id="agree">
            I agree to the terms
        </label>

        <button type="submit">Register</button>
    </form>

    <!-- Live Preview -->
    <div class="preview">
        <h3>Live Preview</h3>
        <p id="previewText">Your details will appear here...</p>
    </div>

    <!-- Message Area -->
    <div id="message"></div>

</div>

<script src="js/app.js"></script>
</body>
</html>
